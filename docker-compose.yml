version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vigil-backend
    hostname: backend
    environment:
      - VIGIL_ENV=production
      - DATABASE_PATH=/app/data/vigil.db
      - POLICY_PATH=/app/policy.yaml
      - PORT=8000
      - HOST=0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      - ./data/sqlite:/app/data:rw
      - ./backend/policy.yaml:/app/policy.yaml:ro
    networks:
      vigil-net:
        aliases:
          - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:808000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: vigil-dashboard
    hostname: dashboard
    environment:
      - NGINX_PORT=8080
    ports:
      - "8085:8080"
    expose:
      - "8080"
    networks:
      vigil-net:
        aliases:
          - dashboard
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:808080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: vigil-caddy
    hostname: caddy
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy-data:/data:rw
      - ./data/caddy-config:/config:rw
      - /var/lib/tailscale/certs:/var/lib/tailscale/certs:ro
    networks:
      vigil-net:
        aliases:
          - caddy
          - vigil.local
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    depends_on:
      backend:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  vigil-net:
    name: vigil-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    labels:
      - "com.vigil.network=true"

volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local
