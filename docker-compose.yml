services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vigil-backend
    hostname: backend
    network_mode: host  # Use host network for ARP scanning
    environment:
      - VIGIL_ENV=production
      - DATABASE_PATH=/app/data/vigil.db
      - POLICY_PATH=/app/policy.yaml
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      - ./backend/data:/app/data:rw
      - ./backend/policy.yaml:/app/policy.yaml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: vigil-dashboard
    network_mode: host
    hostname: dashboard
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  default:
    driver: bridge
