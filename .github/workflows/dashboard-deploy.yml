name: Vigil Dashboard CI/CD

on:
  push:
    branches:
      - hermes/vigil-playbooks-models
    paths:
      - 'dashboard/**'
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/dashboard-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}
  REPO_NAME: agent-woodhouse

jobs:
  # Security and quality scans
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Dashboard)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './dashboard'
          format: 'sarif'
          output: 'trivy-dashboard-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Dashboard scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-dashboard-results.sarif'
          category: 'dashboard-security'

      - name: Upload Backend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'backend-security'

  # Build and push Docker images
  build-dashboard:
    name: Build Dashboard Image
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}-dashboard
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/hermes/vigil-playbooks-models' }}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  build-backend:
    name: Build Backend Image
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}-backend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/hermes/vigil-playbooks-models' }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Deploy to GX-10 production server
  deploy-production:
    name: Deploy to GX-10
    needs: [build-dashboard, build-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/hermes/vigil-playbooks-models'
    environment:
      name: production
      url: http://192.168.50.30:8085
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GX10_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host gx10
            HostName 192.168.50.30
            User erik-ross
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy via SSH
        env:
          SHORT_SHA: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh gx10 << 'EOF'
            set -e
            echo "=== Vigil Dashboard Deployment ==="
            echo "Commit SHA: ${SHORT_SHA::7}"
            echo "Timestamp: $(date)"
            echo ""
            
            cd ~/projects/vigil-home
            
            # Create .env file for GHCR auth
            echo "REGISTRY=ghcr.io" > .env.ghcr
            echo "REPO_OWNER=Kosfootel" >> .env.ghcr
            echo "IMAGE_TAG=${SHORT_SHA::7}" >> .env.ghcr
            
            # Login to GHCR
            echo "Logging into GitHub Container Registry..."
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            
            # Pull new images
            echo "Pulling new images..."
            docker pull ghcr.io/Kosfootel/agent-woodhouse-dashboard:${SHORT_SHA::7} || true
            docker pull ghcr.io/Kosfootel/agent-woodhouse-backend:${SHORT_SHA::7} || true
            
            # Also pull latest tag as fallback
            docker pull ghcr.io/Kosfootel/agent-woodhouse-dashboard:latest || true
            docker pull ghcr.io/Kosfootel/agent-woodhouse-backend:latest || true
            
            # Update docker-compose to use GHCR images
            echo "Updating services..."
            docker compose down dashboard backend 2>/dev/null || true
            
            # Start with updated images
            export IMAGE_TAG=${SHORT_SHA::7}
            docker compose up -d dashboard backend
            
            # Wait for health checks
            echo "Waiting for services to be healthy..."
            sleep 5
            
            # Health check
            echo ""
            echo "Running health checks..."
            for i in {1..10}; do
              if curl -fs http://localhost:8000/health > /dev/null 2>&1; then
                echo "✓ Backend healthy"
                break
              fi
              if [ $i -eq 10 ]; then
                echo "✗ Backend health check failed"
                exit 1
              fi
              sleep 3
            done
            
            for i in {1..10}; do
              if curl -fs http://localhost:8085 > /dev/null 2>&1; then
                echo "✓ Dashboard healthy"
                break
              fi
              if [ $i -eq 10 ]; then
                echo "✗ Dashboard health check failed"
                exit 1
              fi
              sleep 3
            done
            
            # Cleanup old images
            echo ""
            echo "Cleaning up old images..."
            docker image prune -f --filter "until=168h" || true
            
            echo ""
            echo "=== Deployment Complete ==="
            echo "Dashboard: http://192.168.50.30:8085"
            echo "API: http://192.168.50.30:8000"
          EOF

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment to GX-10 successful!"
          echo "Dashboard: http://192.168.50.30:8085"
          echo "API: http://192.168.50.30:8000"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Deployment failed. Rolling back..."
          ssh gx10 << 'EOF'
            cd ~/projects/vigil-home
            docker compose down dashboard backend 2>/dev/null || true
            docker compose up -d dashboard backend
            echo "Rolled back to previous state"
          EOF
